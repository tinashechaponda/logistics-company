<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0D"/>

  <!-- Subtle blue glow top-right -->
  <radialGradient id="glowBlue" cx="80%" cy="20%" r="50%">
    <stop offset="0%" stop-color="#0047BA" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>

  <!-- Subtle green glow bottom-left -->
  <radialGradient id="glowGreen" cx="15%" cy="85%" r="40%">
    <stop offset="0%" stop-color="#00D26A" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#0D0D0D" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glowGreen)"/>

  <!-- Left accent bar -->
  <rect x="72" y="100" width="5" height="430" rx="3" fill="#0047BA"/>

  <!-- BALM wordmark -->
  <text x="104" y="240" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="110" fill="#0047BA" letter-spacing="-3">BALM</text>

  <!-- Green swoosh line under BALM -->
  <path d="M 104 258 C 180 270, 340 265, 460 255" stroke="#00D26A" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Green bar with OF GILEAD LOGISTICS -->
  <rect x="104" y="265" width="480" height="36" rx="4" fill="#00D26A"/>
  <text x="116" y="291" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="20" fill="#0D0D0D" letter-spacing="3">OF GILEAD LOGISTICS</text>

  <!-- Tagline -->
  <text x="104" y="360" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.65)">Delivering Convenience, One Doorstep at a Time.</text>

  <!-- Descriptor chips -->
  <rect x="104" y="400" width="220" height="38" rx="19" fill="rgba(0,71,186,0.25)" stroke="#0047BA" stroke-width="1.5"/>
  <text x="214" y="424" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="16" fill="#7aaee0">Cargo Van Freight</text>

  <rect x="338" y="400" width="200" height="38" rx="19" fill="rgba(0,71,186,0.25)" stroke="#0047BA" stroke-width="1.5"/>
  <text x="438" y="424" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="16" fill="#7aaee0">Same-Day Available</text>

  <rect x="552" y="400" width="180" height="38" rx="19" fill="rgba(0,210,106,0.15)" stroke="#00D26A" stroke-width="1.5"/>
  <text x="642" y="424" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="16" fill="#00D26A">Michigan &amp; Midwest</text>

  <!-- Mini map on the right side -->
  <g transform="translate(760, 60) scale(0.65)">
    <!-- Map background -->
    <rect width="680" height="500" fill="#0f1923" rx="12"/>

    <!-- Secondary states -->
    <polygon points="55,25 280,25 285,55 275,185 215,190 55,190" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>
    <polygon points="55,190 215,190 225,195 230,310 55,310" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>
    <polygon points="55,310 230,310 235,320 240,410 55,415" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>
    <polygon points="275,35 355,30 375,45 390,80 390,110 370,175 340,200 295,205 280,190 285,110 285,55" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>
    <polygon points="240,310 340,305 345,320 350,390 340,430 290,435 240,430 235,390" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>
    <polygon points="340,305 410,302 415,315 418,420 350,425 345,380 345,320" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>
    <polygon points="295,435 418,425 500,428 510,455 480,470 295,470" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>
    <polygon points="415,302 510,295 530,310 535,390 510,420 418,420 415,370 415,315" fill="#1a3d6e" stroke="#0047BA" stroke-width="1.5" opacity="0.85"/>

    <!-- Lakes -->
    <ellipse cx="390" cy="245" rx="28" ry="70" fill="#0d2d45" stroke="#1a4a6e" stroke-width="1" opacity="0.9"/>
    <ellipse cx="540" cy="278" rx="45" ry="15" fill="#0d2d45" stroke="#1a4a6e" stroke-width="1" opacity="0.9"/>
    <ellipse cx="540" cy="200" rx="25" ry="55" fill="#0d2d45" stroke="#1a4a6e" stroke-width="1" opacity="0.9"/>
    <ellipse cx="340" cy="78" rx="110" ry="35" fill="#0d2d45" stroke="#1a4a6e" stroke-width="1" opacity="0.9"/>

    <!-- Michigan -->
    <polygon points="270,118 430,110 460,125 465,150 450,162 390,170 330,168 285,160 265,145" fill="#0047BA" stroke="#00D26A" stroke-width="2.5" opacity="0.95"/>
    <polygon points="415,302 420,295 430,280 445,265 460,260 468,248 490,232 505,220 498,210 480,220 468,238 458,248 445,255 438,268 430,262 420,248 418,235 420,220 416,212 410,175 398,168 385,170 370,175 360,185 350,198 345,215 345,230 350,248 355,268 360,285 362,302" fill="#0047BA" stroke="#00D26A" stroke-width="2.5" opacity="0.95"/>

    <!-- State labels -->
    <text x="155" y="118" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">MN</text>
    <text x="143" y="258" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">IA</text>
    <text x="148" y="368" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">MO</text>
    <text x="332" y="130" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">WI</text>
    <text x="293" y="378" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">IL</text>
    <text x="378" y="370" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">IN</text>
    <text x="400" y="455" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">KY</text>
    <text x="475" y="365" text-anchor="middle" fill="#7aaee0" font-size="13" font-family="Inter,sans-serif" font-weight="700">OH</text>
    <text x="388" y="248" text-anchor="middle" fill="#ffffff" font-size="18" font-family="Inter,sans-serif" font-weight="900">MI</text>
  </g>

  <!-- Domain watermark bottom -->
  <text x="104" y="580" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="20" fill="rgba(255,255,255,0.3)">balmofgileadlogistics.com</text>

  <!-- Bottom green accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#00D26A"/>
</svg>
